<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--fonts-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--tailwind daisyUi-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    

    <!--font integration-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>Assignment-5</title>


</head>


<body class="bg-white shadow-lg w-6/12 mx-auto text-center mt-30 pb-10">
    <div class=" ">
        <div class="p-10 space-y-5 ">
            <div class="h-auto w-[50px] mx-auto flex justify-center">
                <img src="./assets/github-logo.png" alt="logo">
            </div>

            <div>
                <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </div>

                        
                        <!-- login from -->
<fieldset class="fieldset rounded-box mx-auto  w-6/12  items-center justify-center">
        <label class="label font-bold">Username</label>
        <input id="input-name" type="email" class="input" placeholder="Enter Username" />

        <label class="label font-bold">Password</label>
        <input id="password" type="password" class="input" placeholder="Enter Password" />

        <button id="sign-in" class="btn btn-primary mt-4 w-xs">Sign In</button>
</fieldset>

                    <!-- or items -->

        <div class="flex items-center gap-1">
            <div class="flex-1 h-1 bg-gray-300 "></div>
            <span>OR</span>
            <div class="flex-1 h-1 bg-gray-300"></div>
        </div>

                    <!-- demo conditional -->
        <div>
            <div class="text-[#64748B] m-5">Demo Credentials:</div>
        </div>

        <div class="bg-gray-100 rounded-sm mx-auto w-[330px]  p-4 justify-center">
            <p>
                <span class="font-bold ">Username:</span> admin
                <br>    
                <span class="font-bold ">Password:</span> admin123
            </p>
        </div>

    </div>



    <script src="index.js"></script>
</body>


</html>
